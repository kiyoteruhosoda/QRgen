plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

// Release signing — reads android/key.properties written by CI or local dev.
// See docs/signing.md for setup instructions.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}
def hasKeystore = keystoreProperties.getProperty("storeFile") != null

def isReleaseTask = gradle.startParameter.taskNames.any { taskName ->
    taskName.toLowerCase().contains("release")
}

def isGitHubPullRequest = System.getenv("GITHUB_EVENT_NAME") == "pull_request"
def isAzurePullRequest = System.getenv("BUILD_REASON") == "PullRequest"
def allowUnsafeFallbackSigning = isGitHubPullRequest || isAzurePullRequest

if (isReleaseTask && !hasKeystore && !allowUnsafeFallbackSigning) {
    throw new GradleException(
        "Release build requires android/key.properties. For PR validation only, CI pull_request builds may use debug signing."
    )
}

android {
    namespace = "com.nolumia.qrcorebasic"
    compileSdk = 36
    ndkVersion = "26.3.11579264"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    signingConfigs {
        release {
            if (hasKeystore) {
                keyAlias      keystoreProperties["keyAlias"]
                keyPassword   keystoreProperties["keyPassword"]
                storeFile     file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    defaultConfig {
        applicationId = "com.nolumia.qrcorebasic"
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    buildTypes {
        release {
            signingConfig = hasKeystore ? signingConfigs.release : signingConfigs.debug
        }
    }
}

dependencies {
    implementation "androidx.core:core-splashscreen:1.0.1"
}

flutter {
    source = "../.."
}
