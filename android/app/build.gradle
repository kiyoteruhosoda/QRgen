plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

// Release signing — reads android/key.properties written by CI or local dev.
// See docs/signing.md for setup instructions.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}
def hasKeystore = keystoreProperties.getProperty("storeFile") != null

def env = { key -> System.getenv(key) }
def isTruthy = { value -> value != null && !value.trim().isEmpty() }

def pullRequestDetectors = [
    github : {
        def eventName = env("GITHUB_EVENT_NAME")
        def ref = env("GITHUB_REF")
        def githubRefLooksLikePullRequest = isTruthy(ref) && ref ==~ /^refs\/pull\/\d+\/(merge|head)$/

        eventName in ["pull_request", "pull_request_target"] ||
            isTruthy(env("GITHUB_BASE_REF")) ||
            isTruthy(env("GITHUB_HEAD_REF")) ||
            githubRefLooksLikePullRequest
    },
    azure  : {
        env("BUILD_REASON") == "PullRequest" || isTruthy(env("SYSTEM_PULLREQUEST_PULLREQUESTID"))
    },
    gitlab : {
        env("CI_PIPELINE_SOURCE") == "merge_request_event"
    },
    bitbucket: {
        isTruthy(env("BITBUCKET_PR_ID"))
    },
]

def allowUnsafeFallbackSigning = pullRequestDetectors.values().any { detector -> detector() }

gradle.taskGraph.whenReady { taskGraph ->
    def buildsReleaseArtifacts = taskGraph.allTasks.any { task ->
        task.path.toLowerCase().contains(":release") ||
            task.path.toLowerCase().contains("release")
    }

    if (buildsReleaseArtifacts && !hasKeystore && !allowUnsafeFallbackSigning) {
        throw new GradleException(
            "Release build requires android/key.properties. For PR validation only, CI pull_request builds may use debug signing."
        )
    }
}

android {
    namespace = "com.nolumia.qrcorebasic"
    compileSdk = 36
    ndkVersion = "26.3.11579264"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    signingConfigs {
        release {
            if (hasKeystore) {
                keyAlias      keystoreProperties["keyAlias"]
                keyPassword   keystoreProperties["keyPassword"]
                storeFile     file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    defaultConfig {
        applicationId = "com.nolumia.qrcorebasic"
        minSdk = 36
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    buildTypes {
        release {
            signingConfig = (hasKeystore || !allowUnsafeFallbackSigning) ? signingConfigs.release : signingConfigs.debug
        }
    }
}

dependencies {
    implementation "androidx.core:core-splashscreen:1.0.1"
}

flutter {
    source = "../.."
}
